version: 2

_columns: &columns
  - name: cat01
    meta:
      title: 分類事項コード
  - name: item_name
    meta:
      title: 分類事項名
  - name: domain
    meta:
      title: 大分類
  - name: area
    meta:
      title: 地域コード
  - name: area_name
    meta:
      title: 地域名
  - name: time_name
    meta:
      title: 時間軸名
  - name: year
    meta:
      title: 年
  - name: unit
    meta:
      title: 単位
  - name: value
    meta:
      title: 統計値

_meta: &meta
  license: "CC BY 4.0"
  license_url: "https://creativecommons.org/licenses/by/4.0/"
  source_url: "https://www.e-stat.go.jp/statistics/00200502"
  published: true
  tags: ["e-stat", "社会・人口統計体系", "市区町村"]

models:
  - name: a_municipal_population
    description: |
      社会・人口統計体系 A 人口・世帯（市区町村）。
      総人口、年齢別人口、世帯数、出生・死亡、転入・転出等の指標を収録。
      廃置分合処理済データ。
      https://www.e-stat.go.jp/stat-search/database?statdisp_id=0000020201
    access: public
    config:
      meta:
        <<: *meta
        title: "A 人口・世帯（市区町村）"
    columns: *columns

  - name: b_municipal_land
