version: 2

models:
  - name: item_catalog
    description: |
      社会・人口統計体系（SSDS）の基礎データ項目一覧。
      都道府県・市区町村の全22表で利用可能な統計指標とその分類体系を提供する。
      分類体系の詳細: https://www.stat.go.jp/data/ssds/2.html
    access: public
    config:
      meta:
        title: "分類項目定義"
        published: true
        source_url: "https://www.stat.go.jp/data/ssds/2.html"
        tags: ["e-stat", "社会・人口統計体系"]
    columns:
      - name: table_title
        meta:
          title: 統計表題名
      - name: stats_data_id
        meta:
          title: 統計表ID
      - name: class_id
        meta:
          title: 分類軸ID
      - name: class_name
        meta:
          title: 分類軸名
      - name: class_description
        meta:
          title: 分類軸の解説
      - name: item_code
        meta:
          title: 項目コード
      - name: item_name
        meta:
          title: 項目名
      - name: level
        meta:
          title: 階層レベル
      - name: unit
        meta:
          title: 単位
      - name: parent_code
        meta:
          title: 親コード
      - name: add_inf
        meta:
          title: 追加情報
