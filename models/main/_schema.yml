version: 2

models:
  - name: stats_field
    description: |
      [e-Stat API 統計分野一覧](https://www.e-stat.go.jp/api/api-info/statsfield/)を基に作成したマスタテーブル。
    access: public
    config:
      meta:
        title: "統計分野一覧"
        published: true
        source_url: "https://www.e-stat.go.jp/api/api-info/statsfield/"
        tags: ["e-stat", "メタデータ"]
    columns:
      - name: main_category_code
        meta:
          title: 統計大分野コード
      - name: main_category
        meta:
          title: 統計大分野
      - name: sub_category_code
        meta:
          title: 統計小分野コード
      - name: sub_category
        meta:
          title: 統計小分野

  - name: stats_list
    description: |
      e-Stat API getStatsList から取得した統計表情報。
      e-Stat で提供している統計表の情報（政府統計名、作成機関、統計表題名、調査年月、公開日、統計分野等）を提供する。
      API仕様: https://www.e-stat.go.jp/api/api-info/e-stat-manual3-0#api_2_1
    access: public
    config:
      meta:
        title: "統計表一覧"
        published: true
        source_url: "https://www.e-stat.go.jp/stat-search/database"
        tags: ["e-stat", "メタデータ"]
    columns:
      - name: id
        meta:
          title: 統計表ID
      - name: stat_code
        meta:
          title: 政府統計コード
      - name: stat_name
        meta:
          title: 政府統計名
      - name: gov_org_code
        meta:
          title: 作成機関コード
      - name: gov_org_name
        meta:
          title: 作成機関名
      - name: statistics_name
        meta:
          title: 提供統計名称
      - name: tabulation_category
        meta:
          title: 集計分類
      - name: tabulation_sub_category
        meta:
          title: 集計サブ分類
      - name: title
        meta:
          title: 統計表題名
      - name: table_number
        meta:
          title: 表番号
      - name: table_category
        meta:
          title: 表分類
      - name: table_name
        meta:
          title: 表名
      - name: table_explanation
        meta:
          title: 表の説明
      - name: table_sub_category
        meta:
          title: 表サブ分類
      - name: main_category_code
        meta:
          title: 統計大分野コード
      - name: main_category
        meta:
          title: 統計大分野
      - name: sub_category_code
        meta:
          title: 統計小分野コード
      - name: sub_category
        meta:
          title: 統計小分野
      - name: cycle
        meta:
          title: 提供周期
      - name: survey_date
        meta:
          title: 調査年月
      - name: open_date
        meta:
          title: 公開日
      - name: updated_date
        meta:
          title: 更新日
      - name: small_area
        meta:
          title: 小地域属性
      - name: collect_area
        meta:
          title: 集計地域区分
      - name: overall_total_number
        meta:
          title: 総件数

  - name: meta_info
    description: |
      e-Stat API getMetaInfo から取得したメタ情報。
      各統計表の表章事項・分類事項・地域事項・時間軸事項のコード、名称、単位、階層レベル等を提供する。
      API仕様: https://www.e-stat.go.jp/api/api-info/e-stat-manual3-0#api_2_5
    access: public
    config:
      meta:
        title: "メタ情報"
        published: true
        source_url: "https://www.e-stat.go.jp/api/api-info/e-stat-manual3-0#api_2_5"
        tags: ["e-stat", "メタデータ"]
    columns:
      - name: stats_data_id
        meta:
          title: 統計表ID
      - name: class_id
        meta:
          title: 分類軸ID (tab, cat01〜cat15, area, time)
      - name: class_name
        meta:
          title: 分類軸名
      - name: class_description
        meta:
          title: 分類軸の解説
      - name: item_code
        meta:
          title: 項目コード
      - name: item_name
        meta:
          title: 項目名
      - name: level
        meta:
          title: 階層レベル
      - name: unit
        meta:
          title: 単位
      - name: parent_code
        meta:
          title: 親コード
      - name: add_inf
        meta:
          title: 追加情報
