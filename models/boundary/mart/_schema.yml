version: 2

_meta: &meta
  source_url: "https://www.e-stat.go.jp/gis/statmap-search?page=1&type=2&aggregateUnitForBoundary=A&toukeiCode=00200521&toukeiYear=2020&serveyId=A002005212020&coordsys=1&format=gml&datum=2011"
  published: true
  tags: ["e-stat", "国勢調査", "境界", "GIS", "小地域"]

models:
  - name: small_area
    description: |
      令和2年国勢調査 町丁・字等別境界データ。
      境界ポリゴン・人口・世帯数を key_code で結合可能な形で提供。
      水面調査区(HCODE=8154)を除外。
      同一KEY_CODEに複数境界がある場合は代表(KIGO_E=E1)のみ残し、
      飛び地等の重複ポリゴン(E2以降)は除外済み。
    access: public
    config:
      meta:
        <<: *meta
        title: "町丁・字等別境界"
    columns:
      - name: key_code
        description: "図形と集計データのリンクコード（PREF + KEYCODE2）"
        meta:
          title: KEY_CODE
      - name: prefecture_code
        meta:
          title: 都道府県番号
      - name: prefecture_name
        meta:
          title: 都道府県名
      - name: city_code
        meta:
          title: 市区町村番号
      - name: city_name
        meta:
          title: 市区町村名
      - name: area_name
        meta:
          title: 町丁・字等名称
      - name: kigo_e
        description: "町丁・字等の重複フラグ。同一市区町村内に同一の町丁・字等番号を持つ境界が複数存在する場合、境界ごとの基本単位区（調査区）人口が多い順にE1から付与。人口が同じ場合は面積の広い順。島と陸地がある場合は陸地を優先。本モデルではE2以降を除外済み"
        meta:
          title: 特殊記号E
      - name: kigo_d
        description: "D=飛び地、D1=抜け地（飛び地）"
        meta:
          title: 特殊記号D
      - name: kigo_i
        description: "I=島"
        meta:
          title: 特殊記号I
      - name: jinko
        description: "当該町丁・字等の人口。元データではKIGO_E=En(n≧2)の場合は0"
        meta:
          title: 人口
      - name: setai
        description: "当該町丁・字等の世帯数。元データではKIGO_E=En(n≧2)の場合は0"
        meta:
          title: 世帯数
      - name: x_code
        description: "10進経度"
        meta:
          title: 図形中心点X座標
      - name: y_code
        description: "10進緯度"
        meta:
          title: 図形中心点Y座標
      - name: area_m2
        description: "図郭による算出値。公式面積とは一致しない"
        meta:
          title: 面積（㎡）
      - name: geometry
        description: "CRS: EPSG:4612 (JGD2011)"
        meta:
          title: 境界ポリゴン
