semantic_models:
  - name: small_area
    model: ref('small_area')
    defaults:
      agg_time_dimension: null
    entities:
      - name: small_area
        type: primary
        expr: key_code
      - name: prefecture
        type: foreign
        expr: prefecture_code
      - name: city
        type: foreign
        expr: city_code
    dimensions:
      - name: prefecture_name
        type: categorical
      - name: city_name
        type: categorical
      - name: area_name
        type: categorical
      - name: kigo_e
        type: categorical
      - name: kigo_d
        type: categorical
      - name: kigo_i
        type: categorical
    measures:
      - name: population
        agg: sum
        expr: jinko
      - name: households
        agg: sum
        expr: setai
      - name: area_sqm
        agg: sum
        expr: area_m2
