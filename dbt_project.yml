name: "e_stat"
version: "1.0.0"

profile: "e_stat"

model-paths: ["models"]
macro-paths: ["macros"]
clean-targets: ["target", "dbt_packages"]

models:
  e_stat:
    +database: e_stat
    ssds:
      raw:
        +materialized: view
        +meta:
          published: false
      stg:
        +materialized: view
        +meta:
          published: false
      mart:
        +materialized: view
        +meta:
          published: true
